<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد | العيادة</title>
    <link rel="stylesheet" href="دكتورة اسنان _ إتقان ورعاية_files/style.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f8ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-container h2 { text-align: center; color: #0984e3; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #333; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #076ab5; }
        .links { text-align: center; margin-top: 15px; }
        .links a { color: #0984e3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>إنشاء حساب جديد</h2>
        <form action="register.php" method="POST">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">تسجيل</button>
        </form>
        <div class="links">
            <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
    </div>
</body>
</html>
